name: Payment Service CI/CD

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Production release version, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    name: Payment Service CI
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'push' }}
    uses: Quickslot-Capstone-Project/Parking-System/.github/workflows/reusable-ci.yml@master
    with:
      trigger_event: ${{ github.event_name }}
      source_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      service_name: payment-service
      image_name: payment-service
      helm_values_key: paymentService
      docker_context: ./payment-service
      dockerfile_path: ./payment-service/Dockerfile
      working_directory: ./payment-service
      sonar_key: Quickslot-Capstone-Project_Parking-System-payment-service
    secrets: inherit

  release:
    name: Release Payment Service
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: Quickslot-Capstone-Project/Parking-System/.github/workflows/reusable-release.yml@master
    with:
      release_tag: ${{ inputs.release_tag }}
      service_name: payment-service
      image_name: payment-service
      helm_values_key: paymentService
    secrets: inherit
